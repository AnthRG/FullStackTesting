# Perfil de test de integracion: apunta a la pila de docker-compose ya levantada.
# REQUISITO: docker compose up -d   (Postgres + Keycloak corriendo)
#
# Postgres se publica en 5440 en esta maquina (POSTGRES_PORT en .env); ajusta
# TEST_DATASOURCE_URL si en la tuya usa otro puerto.
spring.datasource.url=${TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5440/fullstacktesting}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Resource Server: valida los JWT contra Keycloak publicado en localhost:8081
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/fullstacktesting
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/fullstacktesting/protocol/openid-connect/certs

# Admin API (para los escenarios de asignar/quitar roles)
keycloak.admin.server-url=http://localhost:8081
keycloak.admin.auth-realm=master
keycloak.admin.target-realm=fullstacktesting
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin
