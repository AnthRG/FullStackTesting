spring.application.name=fullstacktesting

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Database (PostgreSQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fullstacktesting}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate

# --- CORS (frontend origins, separados por coma) ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- OAuth2 Resource Server (valida los JWT de Keycloak) ---
# issuer-uri: debe coincidir con el claim "iss" del token (URL publica).
# jwk-set-uri: de donde el backend baja las llaves. En compose lo sobreescribe
#   un env var a la red interna (keycloak:8080); en local usa localhost:8081.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/fullstacktesting}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/fullstacktesting/protocol/openid-connect/certs}

# --- Login (Direct Access Grant del cliente publico "frontend") ---
keycloak.login.token-uri=${KEYCLOAK_LOGIN_TOKEN_URI:http://localhost:8081/realms/fullstacktesting/protocol/openid-connect/token}
keycloak.login.client-id=${KEYCLOAK_LOGIN_CLIENT_ID:frontend}

# --- Keycloak Admin API (para administrar usuarios/roles desde el backend) ---
# server-url SIN /realms. En compose es la red interna (keycloak:8080);
# corriendo el backend en local cambia a http://localhost:8081
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8081}
keycloak.admin.auth-realm=${KEYCLOAK_ADMIN_AUTH_REALM:master}
keycloak.admin.target-realm=${KEYCLOAK_ADMIN_TARGET_REALM:fullstacktesting}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
